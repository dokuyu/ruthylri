<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ruthylri 学習帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --void:#171423;
  --dusk:#221E36;
  --panel:#2A2542;
  --line:#3E3860;
  --mist:#F1ECE2;
  --mist-dim:#B9B3C9;
  --echo:#7FE0C4;
  --echo-dim:#4D9C86;
  --warmth:#E8A87C;
  --warmth-dim:#B9805D;
  --danger:#D98282;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--void);
  color:var(--mist);
  font-family:'Zen Kaku Gothic New',sans-serif;
  min-height:100vh;
}
.wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px;}

.hero{position:relative;text-align:center;padding:36px 0 28px;overflow:hidden;}
.hero svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;height:340px;opacity:.5;pointer-events:none;}
.hero .ring{fill:none;stroke:var(--echo);opacity:0;transform-origin:center;animation:ripple 6s ease-out infinite;}
.hero .ring:nth-child(2){animation-delay:2s;}
.hero .ring:nth-child(3){animation-delay:4s;}
@keyframes ripple{
  0%{r:20;opacity:.55;stroke-width:1.5;}
  100%{r:160;opacity:0;stroke-width:.3;}
}
.hero h1{position:relative;font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;margin:0 0 6px;letter-spacing:.02em;}
.hero .romaji{position:relative;font-family:'JetBrains Mono',monospace;color:var(--echo);font-size:14px;letter-spacing:.12em;margin:0 0 10px;}
.hero p{position:relative;font-size:13px;color:var(--mist-dim);margin:0;line-height:1.7;max-width:420px;margin:0 auto;}

nav{display:flex;gap:2px;background:var(--panel);border:.5px solid var(--line);border-radius:10px;padding:4px;margin:28px 0 24px;}
nav button{
  flex:1;background:transparent;border:none;color:var(--mist-dim);
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;padding:10px 6px;
  border-radius:8px;cursor:pointer;transition:background .15s,color .15s;
}
nav button.active{background:var(--void);color:var(--echo);}
nav button:hover:not(.active){color:var(--mist);}

.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--warmth-dim);text-transform:uppercase;margin:0 0 6px;}
.section-title{font-family:'Shippori Mincho',serif;font-size:19px;margin:0 0 16px;font-weight:700;}

.card{background:var(--panel);border:.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.word{font-family:'JetBrains Mono','Zen Kaku Gothic New',monospace;font-size:17px;color:var(--echo);}
.tag{font-size:11px;color:var(--warmth);background:rgba(232,168,124,.12);border:.5px solid var(--warmth-dim);border-radius:20px;padding:2px 10px;white-space:nowrap;}
.meaning{font-size:13px;color:var(--mist-dim);margin-top:4px;line-height:1.6;}
.small-btn{background:transparent;border:.5px solid var(--line);color:var(--mist-dim);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;}
.small-btn:hover{border-color:var(--danger);color:var(--danger);}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid var(--line);color:var(--mist-dim);background:transparent;cursor:pointer;}
.chip.active{background:var(--echo);border-color:var(--echo);color:var(--void);font-weight:500;}

input,select,textarea{
  width:100%;background:var(--void);border:.5px solid var(--line);color:var(--mist);
  border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;margin-bottom:10px;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--echo);}
label{font-size:12px;color:var(--mist-dim);display:block;margin-bottom:4px;}

button.primary{
  background:var(--echo);color:var(--void);border:none;border-radius:8px;
  padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
}
button.primary:hover{background:#96e8d0;}
button.ghost{
  background:transparent;border:.5px solid var(--line);color:var(--mist-dim);
  border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit;
}
button.ghost:hover{border-color:var(--mist-dim);color:var(--mist);}

.searchbar{display:flex;gap:8px;margin-bottom:12px;}
.searchbar input{margin-bottom:0;}

.conj-table{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0 6px;}
.conj-cell{background:var(--void);border:.5px solid var(--line);border-radius:8px;padding:10px 12px;}
.conj-cell .suffix{font-family:'JetBrains Mono',monospace;color:var(--warmth);font-size:11px;}
.conj-cell .form{font-family:'JetBrains Mono','Zen Kaku Gothic New',monospace;color:var(--echo);font-size:16px;margin:2px 0;}
.conj-cell .gloss{font-size:11px;color:var(--mist-dim);}

.drill-box{background:var(--panel);border:.5px solid var(--line);border-radius:12px;padding:20px;text-align:center;}
.drill-prompt{font-size:15px;margin-bottom:14px;line-height:1.7;}
.drill-prompt b{color:var(--warmth);font-weight:500;}
.feedback{font-size:13px;margin-top:10px;min-height:20px;}
.feedback.correct{color:var(--echo);}
.feedback.wrong{color:var(--danger);}

.quiz-choice{
  display:block;width:100%;text-align:left;background:var(--void);border:.5px solid var(--line);
  color:var(--mist);border-radius:8px;padding:11px 14px;margin-bottom:8px;font-size:14px;cursor:pointer;font-family:inherit;
}
.quiz-choice:hover{border-color:var(--echo);}
.quiz-choice.correct{border-color:var(--echo);background:rgba(127,224,196,.1);}
.quiz-choice.wrong{border-color:var(--danger);background:rgba(217,130,130,.1);}

.score-strip{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--mist-dim);margin-bottom:14px;}
.score-strip span b{color:var(--echo);font-size:16px;}

.empty{text-align:center;padding:30px 10px;color:var(--mist-dim);font-size:13px;}
.hidden{display:none;}

.mark{color:var(--warmth);}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <svg viewBox="0 0 340 340" aria-hidden="true">
      <circle class="ring" cx="170" cy="170" r="20"/>
      <circle class="ring" cx="170" cy="170" r="20"/>
      <circle class="ring" cx="170" cy="170" r="20"/>
    </svg>
    <h1>ruthylri 学習帳</h1>
    <p class="romaji">ru + thyl + ri</p>
    <p>「やさしさを分け合う者たち」 — 第五宇宙 星23区画語、独ュ゛さんによる言語資料をもとにした学習帳</p>
  </div>

  <nav>
    <button class="active" data-tab="vocab">単語帳</button>
    <button data-tab="conj">活用ドリル</button>
    <button data-tab="sentence">文章</button>
    <button data-tab="quiz">クイズ</button>
  </nav>

  <div id="tab-vocab"></div>
  <div id="tab-conj" class="hidden"></div>
  <div id="tab-sentence" class="hidden"></div>
  <div id="tab-quiz" class="hidden"></div>

</div>

  {w:"uv",cat:"表現",m:"どこ(疑問詞)"},
  {w:"ul",cat:"表現",m:"いつ(疑問詞)"},
  {w:"uk",cat:"表現",m:"なぜ(疑問詞)"},
  {w:"fo",cat:"数字",m:"0"},{w:"la",cat:"数字",m:"1"},{w:"li",cat:"数字",m:"2"},
  {w:"ly",cat:"数字",m:"3"},{w:"le",cat:"数字",m:"4"},{w:"na",cat:"数字",m:"5"},
  {w:"ni",cat:"数字",m:"6"},{w:"ny",cat:"数字",m:"7"},{w:"ne",cat:"数字",m:"8"},
  {w:"sa",cat:"数字",m:"9"},{w:"si",cat:"数字",m:"10"},
  {w:"sili",cat:"数字",m:"20 (si+li)"},{w:"sily",cat:"数字",m:"30 (si+ly)"},{w:"sile",cat:"数字",m:"40 (si+le)"},
];

const CONJUGATABLE = [
  ...SEED.filter(x=>x.cat==="語根" && !["et"].includes(x.w)),
  ...SEED.filter(x=>x.cat==="形容詞"),
];

const SUFFIX = [
  {s:"-a",name:"現在形",desc:"今まさにそうである"},
  {s:"-i",name:"過去形",desc:"過去にそうだった"},
  {s:"-y",name:"残響形",desc:"過去に始まって今も続いている"},
  {s:"-e",name:"疑問形",desc:"問いかけ"},
];

const CATS = ["すべて","名詞","形容詞","語根","表現","数字","代名詞","固有名詞"];

const SENTENCE_PATTERNS = [
  {name:"平叙文", example:"mi syl ruma-a", ja:"私は豊かなごはんを食べる", note:"主語 + (形容詞) + 名詞/語根-語尾 の順(SOV)"},
  {name:"平叙文(単純)", example:"mi mamm-a", ja:"私は満たされている", note:"主語 + 述語-語尾。形容詞や名詞は単独で述語になれる"},
  {name:"疑問文", example:"un ruma-e?", ja:"何を食べますか?", note:"疑問詞(un/ur/uv/ul/uk) + 述語-e?"},
  {name:"疑問文(主語あり)", example:"ri syl-e?", ja:"彼/彼女(それ)は豊かですか?", note:"主語 + 述語-e?"},
  {name:"願望(パターンA)", example:"mi ruma nel-a\u309b", ja:"私はごはんを食べたい", note:"主語 + 名詞 + nel-語尾"},
  {name:"願望(パターンB)", example:"nel oka-a", ja:"待ちたい", note:"nel + 語根-語尾"},
];

const SENTENCE_BANK = [
  {tokens:["mi","syl","ruma-a"], ja:"私は豊かなごはんを食べる"},
  {tokens:["mi","ruma","nel-a\u309b"], ja:"私はごはんを食べたい"},
  {tokens:["un","ruma-e?"], ja:"何を食べますか?"},
  {tokens:["ur","nu-i","vi?"], ja:"誰を見つけましたか?"},
  {tokens:["uv","thyl","nur-a?"], ja:"花守はどこにいますか?"},
  {tokens:["nel","ruma-a"], ja:"ごはんが食べたい"},
  {tokens:["nel","oka-a"], ja:"待ちたい"},
  {tokens:["nel","nu-i"], ja:"見つけたかった"},
  {tokens:["mi","mamm-a"], ja:"私は満たされている"},
  {tokens:["vi","thyl-y\u309b"], ja:"あなたのやさしさの時間が、今も続いている……"},
  {tokens:["min","ruma-a"], ja:"私たちはご飯を分け合っている"},
  {tokens:["ri","syl-e?"], ja:"彼/彼女(それ)は豊かですか?"},
];

const STORY = [
  {tokens:["keth","vora,","thur-i\u309b."], ja:"けてゃなの戦士、それは強かった……"},
  {tokens:["Vayoyo,","ruthylri","thur-y\u309b","vora,","keth","yau-i","ri."], ja:"ヴァョヨ──ルスュルリの中で最も強い戦士──が、けてゃなを封じた。"},
  {tokens:["keth","ily-e\u309b...","vine-i\u309b."], ja:"けてゃなは、もう歩けない……(それが)長く続いている。"},
  {tokens:["et","ri","nu-a\u309b,","ruthylri","nu-i","ri,","ri","ruma-a\u309b."], ja:"そして今も──近づいたルスュルリを見つけると、けてゃなはそれを食べる……"},
];

let vocab = [];
let activeCat = "すべて";
let searchTerm = "";

async function loadVocab(){
  try{
    const res = await window.storage.get('vocab-list', false);
    vocab = JSON.parse(res.value);
  }catch(e){
    vocab = SEED.slice();
    try{ await window.storage.set('vocab-list', JSON.stringify(vocab), false); }catch(e2){}
  }
}
async function saveVocab(){
  try{ await window.storage.set('vocab-list', JSON.stringify(vocab), false); }
  catch(e){ console.error('save failed', e); }
}

function renderVocab(){
  const root = document.getElementById('tab-vocab');
  const filtered = vocab.filter(x=>{
    const catOk = activeCat==="すべて" || x.cat===activeCat;
    const term = searchTerm.trim();
    const searchOk = !term || x.w.includes(term) || x.m.includes(term);
    return catOk && searchOk;
  });

  root.innerHTML = `
    <p class="eyebrow">記録 · 単語</p>
    <h2 class="section-title">単語帳</h2>
    <div class="searchbar">
      <input id="search-input" placeholder="単語や意味で検索" value="${escapeAttr(searchTerm)}">
    </div>
    <div class="chips" id="cat-chips">
      ${CATS.map(c=>`<button class="chip ${c===activeCat?'active':''}" data-cat="${c}">${c}</button>`).join('')}
    </div>
    <div class="card" style="border-color:var(--echo-dim);">
      <label>単語を追加</label>
      <input id="new-word" placeholder="単語 (例: mylhana)">
      <select id="new-cat">
        ${CATS.filter(c=>c!=="すべて").map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
      <textarea id="new-meaning" rows="2" placeholder="意味"></textarea>
      <button class="primary" id="add-word-btn">単語帳に追加</button>
    </div>
    <div id="word-list"></div>
  `;

  const list = document.getElementById('word-list');
  if(filtered.length===0){
    list.innerHTML = `<div class="empty">この条件の単語はまだありません。</div>`;
  }else{
    list.innerHTML = filtered.map((x,idx)=>{
      const realIdx = vocab.indexOf(x);
      return `
      <div class="card">
        <div class="row">
          <div>
            <span class="word">${esc(x.w)}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="tag">${esc(x.cat)}</span>
            <button class="small-btn" data-del="${realIdx}">削除</button>
          </div>
        </div>
        <div class="meaning">${esc(x.m)}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('search-input').oninput = (e)=>{ searchTerm = e.target.value; renderVocab(); };
  document.querySelectorAll('#cat-chips .chip').forEach(b=>{
    b.onclick = ()=>{ activeCat = b.dataset.cat; renderVocab(); };
  });
  document.getElementById('add-word-btn').onclick = async ()=>{
    const w = document.getElementById('new-word').value.trim();
    const cat = document.getElementById('new-cat').value;
    const m = document.getElementById('new-meaning').value.trim();
    if(!w || !m) return;
    vocab.push({w,cat,m});
    await saveVocab();
    renderVocab();
  };
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = async ()=>{
      vocab.splice(parseInt(b.dataset.del),1);
      await saveVocab();
      renderVocab();
    };
  });
}

function esc(s){ return (s+"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }

// ---------- 活用ドリル ----------
let selectedRoot = CONJUGATABLE[0];
let drillTarget = null;

function conjugate(root, suffix){
  return root + suffix;
}

function renderConj(){
  const root = document.getElementById('tab-conj');
  root.innerHTML = `
    <p class="eyebrow">記録 · 活用</p>
    <h2 class="section-title">活用ドリル</h2>
    <div class="card">
      <label>語根 / 形容詞を選ぶ</label>
      <select id="root-select">
        ${CONJUGATABLE.map(x=>`<option value="${esc(x.w)}" ${x.w===selectedRoot.w?'selected':''}>${esc(x.w)} — ${esc(x.m)}</option>`).join('')}
      </select>
      <div class="conj-table">
        ${SUFFIX.map(s=>`
          <div class="conj-cell">
            <div class="suffix">${s.s} <span style="color:var(--mist-dim)">${s.name}</span></div>
            <div class="form">${esc(selectedRoot.w)}${s.s}</div>
            <div class="gloss">${s.desc}</div>
          </div>`).join('')}
      </div>
      <div class="meaning" style="margin-top:8px;">゛(余情記号)を末尾に添えると、言い切れない感情の余白を表せる。例: <span class="mark">${esc(selectedRoot.w)}-y\u309b</span></div>
    </div>

    <div class="card">
      <div class="eyebrow" style="margin-bottom:10px;">練習</div>
      <div class="drill-box">
        <div class="drill-prompt" id="drill-prompt"></div>
        <input id="drill-input" placeholder="ruthylri語で入力(例: nu-y)">
        <button class="primary" id="drill-check">答え合わせ</button>
        <button class="ghost" id="drill-next" style="margin-left:8px;">次の問題</button>
        <div class="feedback" id="drill-feedback"></div>
      </div>
    </div>
  `;

  document.getElementById('root-select').onchange = (e)=>{
    selectedRoot = CONJUGATABLE.find(x=>x.w===e.target.value);
    renderConj();
  };
  document.getElementById('drill-next').onclick = nextDrill;
  document.getElementById('drill-check').onclick = checkDrill;
  if(!drillTarget) nextDrill(); else showDrillPrompt();
}

function nextDrill(){
  const root = CONJUGATABLE[Math.floor(Math.random()*CONJUGATABLE.length)];
  const suf = SUFFIX[Math.floor(Math.random()*SUFFIX.length)];
  drillTarget = {root, suf};
  showDrillPrompt();
}
function showDrillPrompt(){
  const {root,suf} = drillTarget;
  document.getElementById('drill-prompt').innerHTML =
    `「<b>${esc(root.m)}</b>」を <b>${suf.name}(${suf.s})</b> にすると?`;
  document.getElementById('drill-input').value = '';
  document.getElementById('drill-feedback').textContent = '';
  document.getElementById('drill-feedback').className = 'feedback';
}
function checkDrill(){
  const val = document.getElementById('drill-input').value.trim().replace(/\u309b$/,'');
  const {root,suf} = drillTarget;
  const answer = conjugate(root.w, suf.s);
  const fb = document.getElementById('drill-feedback');
  if(val.toLowerCase() === answer.toLowerCase()){
    fb.textContent = `正解 — ${answer}`;
    fb.className = 'feedback correct';
  }else{
    fb.textContent = `おしい。正解は ${answer}`;
    fb.className = 'feedback wrong';
  }
}

// ---------- 文章 ----------
let scrambleTarget = null;
let scrambleBuilt = [];
let scramblePool = [...SENTENCE_BANK, ...STORY];

function newScramble(){
  const s = scramblePool[Math.floor(Math.random()*scramblePool.length)];
  scrambleTarget = s;
  scrambleBuilt = [];
  scrambleTarget._order = null;
  renderScramble();
}

function renderScramble(){
  const wrap = document.getElementById('scramble-area');
  if(!wrap) return;
  if(!scrambleTarget._order){
    scrambleTarget._order = scrambleTarget.tokens.map((_,i)=>i).sort(()=>Math.random()-0.5);
  }
  const orderedRemaining = scrambleTarget._order.filter(i=>!scrambleBuilt.includes(i));

  wrap.innerHTML = `
    <div class="drill-prompt">「<b>${esc(scrambleTarget.ja)}</b>」を正しい順に並べよう</div>
    <div style="min-height:44px;padding:10px;background:var(--void);border:.5px solid var(--line);border-radius:8px;margin-bottom:10px;font-family:'JetBrains Mono','Zen Kaku Gothic New',monospace;color:var(--echo);">
      ${scrambleBuilt.map(i=>esc(scrambleTarget.tokens[i])).join(' ') || '<span style="color:var(--mist-dim);font-family:\'Zen Kaku Gothic New\',sans-serif;">ここに単語をタップして並べる</span>'}
    </div>
    <div id="scramble-tokens">
      ${orderedRemaining.map(i=>`<button class="chip" style="font-family:'JetBrains Mono','Zen Kaku Gothic New',monospace;" data-i="${i}">${esc(scrambleTarget.tokens[i])}</button>`).join('')}
    </div>
    <div style="margin-top:12px;">
      <button class="primary" id="scramble-check">答え合わせ</button>
      <button class="ghost" id="scramble-reset" style="margin-left:8px;">やり直し</button>
      <button class="ghost" id="scramble-next" style="margin-left:8px;">次の文章</button>
    </div>
    <div class="feedback" id="scramble-feedback"></div>
  `;

  wrap.querySelectorAll('#scramble-tokens .chip').forEach(b=>{
    b.onclick = ()=>{ scrambleBuilt.push(parseInt(b.dataset.i)); renderScramble(); };
  });
  document.getElementById('scramble-reset').onclick = ()=>{ scrambleBuilt=[]; renderScramble(); };
  document.getElementById('scramble-next').onclick = newScramble;
  document.getElementById('scramble-check').onclick = ()=>{
    const fb = document.getElementById('scramble-feedback');
    const correct = scrambleBuilt.length===scrambleTarget.tokens.length &&
      scrambleBuilt.every((v,idx)=>v===idx);
    if(correct){
      fb.textContent = '正解 — きれいに並んだ……';
      fb.className = 'feedback correct';
    }else{
      fb.textContent = `まだ違うよ。正解: ${scrambleTarget.tokens.join(' ')}`;
      fb.className = 'feedback wrong';
    }
  };
}

const PRONOUNS = [{v:"mi",m:"私は"},{v:"vi",m:"あなたは"},{v:"ri",m:"彼/彼女/それは"},{v:"min",m:"私たちは"},{v:"vin",m:"あなたたちは"},{v:"rin",m:"彼らは"}];
const ADJ_FOR_BUILDER = SEED.filter(x=>x.cat==="形容詞");
const NOUN_FOR_BUILDER = SEED.filter(x=>x.cat==="名詞");

function renderBuilder(){
  const pronoun = document.getElementById('b-pronoun').value;
  const adj = document.getElementById('b-adj').value;
  const noun = document.getElementById('b-noun').value;
  const suf = document.getElementById('b-suffix').value;
  const mark = document.getElementById('b-mark').checked ? '\u309b' : '';
  const parts = [pronoun];
  if(adj) parts.push(adj);
  parts.push(noun + suf + mark);
  document.getElementById('builder-output').innerHTML =
    `<span class="word" style="font-size:19px;">${esc(parts.join(' '))}</span>`;
}

function renderSentence(){
  const root = document.getElementById('tab-sentence');
  root.innerHTML = `
    <p class="eyebrow">記録 · 文章</p>
    <h2 class="section-title">文型パターン</h2>
    ${SENTENCE_PATTERNS.map(p=>`
      <div class="card">
        <div class="row">
          <span class="tag">${esc(p.name)}</span>
        </div>
        <div class="word" style="margin-top:8px;">${esc(p.example)}</div>
        <div class="meaning">${esc(p.ja)}</div>
        <div class="meaning" style="color:var(--warmth);margin-top:4px;">${esc(p.note)}</div>
      </div>
    `).join('')}

    <h2 class="section-title" style="margin-top:28px;">組み立てクイズ</h2>
    <div class="card" id="scramble-area"></div>

    <h2 class="section-title" style="margin-top:28px;">文章メーカー</h2>
    <div class="card">
      <label>主語</label>
      <select id="b-pronoun">${PRONOUNS.map(p=>`<option value="${p.v}">${p.v} (${p.m})</option>`).join('')}</select>
      <label>形容詞(任意)</label>
      <select id="b-adj"><option value="">(なし)</option>${ADJ_FOR_BUILDER.map(a=>`<option value="${esc(a.w)}">${esc(a.w)} — ${esc(a.m.split(' / ')[0])}</option>`).join('')}</select>
      <label>名詞</label>
      <select id="b-noun">${NOUN_FOR_BUILDER.map(n=>`<option value="${esc(n.w)}">${esc(n.w)} — ${esc(n.m.split(' / ')[0])}</option>`).join('')}</select>
      <label>語尾</label>
      <select id="b-suffix">${SUFFIX.map(s=>`<option value="${s.s}">${s.s} (${s.name})</option>`).join('')}</select>
      <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="b-mark" style="width:auto;margin:0;"> ゛(余情記号)を添える</label>
      <div style="background:var(--void);border:.5px solid var(--line);border-radius:8px;padding:14px;margin-top:8px;" id="builder-output"></div>
      <div class="meaning" style="margin-top:8px;">主語+(形容詞)+名詞-語尾 のSOVパターンで組み立てた文。実際の語感に合うかは要練習(独自表現として楽しんでOK)。</div>
    </div>
  `;

  ['b-pronoun','b-adj','b-noun','b-suffix','b-mark'].forEach(id=>{
    document.getElementById(id).onchange = renderBuilder;
  });
  renderBuilder();
  newScramble();
}

// ---------- クイズ ----------
let quizScore = {correct:0, total:0};
let currentQuiz = null;

async function loadScore(){
  try{
    const res = await window.storage.get('quiz-score', false);
    quizScore = JSON.parse(res.value);
  }catch(e){ quizScore = {correct:0,total:0}; }
}
async function saveScore(){
  try{ await window.storage.set('quiz-score', JSON.stringify(quizScore), false); }catch(e){}
}

function buildQuizQuestion(){
  const pool = vocab.filter(x=>x.cat!=="数字");
  const target = pool[Math.floor(Math.random()*pool.length)];
  const distractors = pool.filter(x=>x!==target).sort(()=>Math.random()-0.5).slice(0,3);
  const options = [target, ...distractors].sort(()=>Math.random()-0.5);
  const askWord = Math.random() < 0.5;
  return {target, options, askWord};
}

function renderQuiz(){
  const root = document.getElementById('tab-quiz');
  currentQuiz = buildQuizQuestion();
  const {target, options, askWord} = currentQuiz;

  root.innerHTML = `
    <p class="eyebrow">記録 · 確認</p>
    <h2 class="section-title">クイズ</h2>
    <div class="score-strip">
      <span>正解数 <b>${quizScore.correct}</b> / ${quizScore.total}</span>
      <button class="ghost" id="reset-score">スコアをリセット</button>
    </div>
    <div class="card">
      <div class="drill-prompt">
        ${askWord
          ? `<span class="word" style="font-size:20px;">${esc(target.w)}</span> の意味は?`
          : `「<b>${esc(target.m)}</b>」を表す単語は?`}
      </div>
      <div id="quiz-options"></div>
      <div class="feedback" id="quiz-feedback"></div>
    </div>
  `;

  const optRoot = document.getElementById('quiz-options');
  optRoot.innerHTML = options.map((o,i)=>`
    <button class="quiz-choice" data-idx="${i}">${askWord ? esc(o.m) : esc(o.w)}</button>
  `).join('');

  document.getElementById('reset-score').onclick = async ()=>{
    quizScore = {correct:0,total:0};
    await saveScore();
    renderQuiz();
  };

  document.querySelectorAll('.quiz-choice').forEach(btn=>{
    btn.onclick = async ()=>{
      const chosen = options[parseInt(btn.dataset.idx)];
      const isCorrect = chosen===target;
      document.querySelectorAll('.quiz-choice').forEach(b=>b.disabled=true);
      btn.classList.add(isCorrect?'correct':'wrong');
      if(!isCorrect){
        document.querySelectorAll('.quiz-choice').forEach(b=>{
          const o = options[parseInt(b.dataset.idx)];
          if(o===target) b.classList.add('correct');
        });
      }
      quizScore.total += 1;
      if(isCorrect) quizScore.correct += 1;
      await saveScore();
      const fb = document.getElementById('quiz-feedback');
      fb.textContent = isCorrect ? '正解 — 残響が続いている……' : `不正解。正解は ${askWord?target.m:target.w}`;
      fb.className = 'feedback ' + (isCorrect?'correct':'wrong');
      setTimeout(renderQuiz, 1300);
    };
  });
}

function escapeAttr(s){ return esc(s).replace(/"/g,'&quot;'); }

// ---------- タブ切り替え ----------
document.querySelectorAll('nav button').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['vocab','conj','sentence','quiz'].forEach(t=>{
      document.getElementById('tab-'+t).classList.toggle('hidden', 'tab-'+t !== 'tab-'+btn.dataset.tab);
    });
  };
});

(async function init(){
  await loadVocab();
  await loadScore();
  renderVocab();
  renderConj();
  renderSentence();
  renderQuiz();
})();
</script>
